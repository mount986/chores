{% extends "base.html" %}
{% block title %}Welcome{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-violet-50 via-white to-amber-50 p-6">

  <div class="text-center mb-12">
    <div class="text-7xl mb-4">⭐</div>
    <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight">Chore Tracker</h1>
    <p class="text-gray-400 mt-2 text-lg">Who's using the app today?</p>
  </div>

  <div class="flex flex-col sm:flex-row gap-6 w-full max-w-md">

    <!-- Kid button -->
    <a href="{{ url_for('child.select') }}"
       class="flex-1 group bg-gradient-to-br from-amber-400 to-orange-500 rounded-3xl p-8 text-center shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-200">
      <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-200">🧒</div>
      <div class="text-2xl font-bold text-white">I'm a Kid!</div>
      <div class="text-orange-100 text-sm mt-1">View my chores &amp; rewards</div>
    </a>

    <!-- Parent button -->
    <a href="{{ url_for('parent.login') }}"
       class="flex-1 group bg-gradient-to-br from-indigo-500 to-violet-600 rounded-3xl p-8 text-center shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-200">
      <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-200">👨‍👩‍👧</div>
      <div class="text-2xl font-bold text-white">I'm a Parent</div>
      <div class="text-indigo-200 text-sm mt-1">Manage chores &amp; rewards</div>
    </a>

  </div>
</div>
{% endblock %}
