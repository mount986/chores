apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chores.name" . }}
  labels:
    {{- include "chores.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chores.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chores.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: chores
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.env.port }}
          env:
            - name: PORT
              value: {{ .Values.env.port | quote }}
            - name: DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chores.name" . }}
                  key: secret-key
          volumeMounts:
            - name: instance
              mountPath: /app/instance
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: instance
          persistentVolumeClaim:
            claimName: {{ include "chores.name" . }}-instance
