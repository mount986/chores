image:
  repository: chores
  tag: working
  pullPolicy: IfNotPresent

# Must stay at 1 — SQLite does not support concurrent writers
replicaCount: 1

service:
  type: LoadBalancer
  port: 5005

# Override the container entrypoint and/or arguments.
# Example: command: ["python", "-m", "flask", "run"]
#          args: ["--host=0.0.0.0"]
#command: ["sleep", "infinity"]
#args: []

env:
  port: 5005
  databaseUrl: sqlite:////app/instance/chores.db

# Set secretKey to a long random string before deploying
secret:
  secretKey: "change-me-before-production"

persistence:
  storageClass: ""
  size: 1Gi
  # Mount a host directory instead of a PVC (useful for local development).
  # On Docker Desktop for Windows, translate the path:
  #   C:\Users\you\project\instance  →  /run/desktop/mnt/host/c/Users/you/project/instance
  hostPath: ""

ingress:
  enabled: false
  className: ""
  host: chores.example.com
  tls: false
