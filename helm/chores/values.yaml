image:
  repository: chores
  tag: latest
  pullPolicy: IfNotPresent

# Must stay at 1 — SQLite does not support concurrent writers
# and APScheduler must not run in multiple pods simultaneously.
replicaCount: 1

service:
  type: ClusterIP
  port: 8000
  # For Tailscale LoadBalancer exposure (alternative to ingress):
  #   type: LoadBalancer
  #   annotations:
  #     tailscale.com/expose: "true"
  #     tailscale.com/hostname: "chores"
  annotations: {}

env:
  port: 8000
  databaseUrl: sqlite:////app/instance/database/chores.db

# Set secretKey to a long random string before deploying.
# Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
secret:
  secretKey: "2ebd39001b79a5f6667325eaa767cdf45bb7f7926ae79a60673e6ab694c5d994"

persistence:
  storageClass: ""
  size: 1Gi
  # Mount a host directory instead of a PVC — useful for local dev.
  # Docker Desktop (Windows): translate the path to the project's instance/ subfolder:
  #   C:\Users\you\project\instance  →  /run/desktop/mnt/host/c/Users/you/project/instance
  # Set to "" or remove to use a PVC instead.
  hostPath: "/run/desktop/mnt/host/c/Users/matth/devl/Chores/instance"

# Tailscale Ingress (recommended for production):
#   1. Install the Tailscale operator in your cluster
#   2. Enable ingress below — the app will be reachable at
#      https://chores.<your-tailnet>.ts.net with automatic TLS
ingress:
  enabled: false
  className: ""       # set to "tailscale" for Tailscale operator
  host: "chores"      # Tailscale uses this as the device/hostname
  tls: false          # set true for Tailscale HTTPS
